name: Terminal Invisible Ultra Anti Bloqueos

on:
  workflow_dispatch:

jobs:
  run-ssh:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar base
        uses: actions/checkout@v4

      - name: Instalar Terminal Nativa y Cloudflare desde Repositorio Oficial
        run: |
          sudo apt-get update
          # 1. Instalar la terminal nativa del sistema operativo
          sudo apt-get install -y shellinabox
          
          # 2. Descargar e instalar Cloudflare usando su paquete de distribucion empaquetado
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Encender Terminal e Iniciar Tunel Camuflado
        run: |
          # 1. Forzar encendido de la terminal web nativa en el puerto 4200 sin cifrado SSL local
          sudo shellinaboxd -b -p 4200 --disable-ssl
          
          # 2. Lanzar el tunel usando el comando oficial global del sistema
          cloudflared tunnel --url http://localhost:4200
