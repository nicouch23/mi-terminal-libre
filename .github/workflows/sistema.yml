name: Navegador Visual Ultra Rapido con Audio

on:
  workflow_dispatch:

jobs:
  run-browser:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar base del repositorio
        uses: actions/checkout@v4

      - name: Encender Navegador con Audio e Iniciar Tunel Camuflado
        run: |
          # 1. Encendemos el contenedor del navegador interactivo con audio
          docker run -d --name navegador -p 8080:6901 --shm-size=512m -e VNC_PW=password kasmweb/chromium:1.15.0-rolling
          
          # 2. Descargamos Cloudflare desde su servidor oficial de distribución (Nunca baja HTML)
          wget -q https://cloudflare.com
          mv cloudflared-linux-amd64 cloudflared
          chmod +x cloudflared
          
          # 3. Le damos 15 segundos exactos a la maquina para inicializar el puerto 8080
          sleep 15
          
          # 4. Lanzamos el puente invisible apuntando al puerto estabilizado
          ./cloudflared tunnel --url http://localhost:8080
