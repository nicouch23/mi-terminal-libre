name: Terminal Invisible Anti Bloqueos

on:
  workflow_dispatch:

jobs:
  run-ssh:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar Terminal Web Integrada
        run: |
          sudo apt-get update
          sudo apt-get install -y ttyd
          # Arrancamos la terminal web en el puerto 7681
          ttyd -p 7681 bash &
          
      - name: Instalar y Configurar Tunel ngrok
        run: |
          curl -s https://amazonaws.com | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update && sudo apt-get install ngrok
          # AQUÍ PEGAS TU TOKEN (Reemplaza lo que está entre comillas)
          ngrok config add-authtoken "3GdTIs00VgcIfGnbE6ZJWFaDA20_83bVmk3GokATd5YyWpkiS"
          
      - name: Abrir Enlace Libre Permanente
        run: |
          ngrok http 7681
