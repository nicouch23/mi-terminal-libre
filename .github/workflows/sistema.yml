name: Terminal Invisible Ultra Anti Bloqueos

on:
  workflow_dispatch:

jobs:
  run-ssh:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar base
        uses: actions/checkout@v4

      - name: Instalar Terminal Gotty y Cloudflared
        run: |
          sudo apt-get update
          # Descargamos Gotty (la terminal que no usa WebSockets obligatorios)
          wget -q https://github.com
          tar -xzf gotty_linux_amd64.tar.gz
          chmod +x gotty
          
          # Descargamos el agente de Cloudflare
          wget -q https://github.com
          chmod +x cloudflared-linux-amd64

      - name: Encender Terminal e Iniciar Tunel Camuflado
        run: |
          # 1. Activamos Gotty en el puerto 8080 permitiendo escribir de forma libre (-w)
          ./gotty -w -p 8080 bash &
          
          # 2. Lanzamos el puente invisible de Cloudflare
          ./cloudflared-linux-amd64 tunnel --url http://localhost:8080
