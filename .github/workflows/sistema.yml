name: Terminal Invisible Ultra Anti Bloqueos

on:
  workflow_dispatch:

jobs:
  run-ssh:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar base
        uses: actions/checkout@v4

      - name: Instalar Terminal Web Ligera
        run: |
          sudo apt-get update
          sudo apt-get install -y ttyd

      - name: Descargar y Ejecutar Tunel de Cloudflare
        run: |
          # 1. Activamos la terminal en segundo plano
          ttyd -p 8080 bash &
          
          # 2. Descargamos el ejecutable directo sin instaladores pesados
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          
          # 3. Lanzamos el puente camuflado directo
          ./cloudflared-linux-amd64 tunnel --url http://localhost:8080
