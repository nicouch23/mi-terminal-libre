name: Escritorio Cyberpunk Libre con Audio

on:
  workflow_dispatch:

jobs:
  run-desktop:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar base del repositorio
        uses: actions/checkout@v4

      - name: Instalar Entorno Grafico, Google Chrome y Sistema de Audio
        run: |
          sudo apt-get update
          
          # 1. Instalar dependencias del escritorio ligero, servidor de video Xvfb y Audio
          sudo apt-get install -y xfce4 xfce4-goodies xvfb x11vnc fluxbox pulseaudio pavucontrol
          
          # 2. Instalar el emulador de pantalla web noVNC (Nativo en puerto 6080)
          sudo apt-get install -y novnc websockify
          
          # 3. Descargar e instalar Google Chrome Estable Oficial
          wget -q https://google.com
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb

      - name: Encender Motores, Audio e Iniciar Tunel Camuflado Cloudflare
        run: |
          # A. Arrancar la pantalla virtual en alta definicion (1280x720) de fondo
          Xvfb :1 -screen 0 1280x720x24 &
          export DISPLAY=:1
          sleep 3
          
          # B. Encender el gestor de ventanas y el servidor de transmision visual
          fluxbox &
          x11vnc -display :1 -nopw -listen localhost -forever -shared &
          
          # C. Iniciar el servidor de sonido PulseAudio en la máquina
          pulseaudio --start --exit-idle-time=-1
          
          # D. Lanzar la interfaz web interactiva noVNC en el puerto 6080
          /usr/share/novnc/utils/launch.sh --vnc localhost:5900 --listen 6080 &
          sleep 5
          
          # E. Descargar el binario seguro de Cloudflare (Formato robusto, nunca falla)
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          
          # F. Abrir el tunel invisible apuntando a la pantalla interactiva
          ./cloudflared-linux-amd64 tunnel --url http://localhost:6080
