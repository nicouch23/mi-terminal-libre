name: Terminal Invisible Ultra Anti Bloqueos

on:
  workflow_dispatch:

jobs:
  run-ssh:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar base
        uses: actions/checkout@v4

      - name: Instalar Terminal Nativa y Cloudflare
        run: |
          sudo apt-get update
          sudo apt-get install -y shellinabox
          
          # Descargamos e instalamos Cloudflare oficialmente
          curl -L --output cloudflared.deb https://github.com
          sudo dpkg -i cloudflared.deb

      - name: Encender Terminal e Iniciar Tunel Camuflado
        run: |
          # 1. Detenemos por completo el servicio automático para liberar el puerto
          sudo systemctl stop shellinabox
          
          # 2. Encendemos la terminal limpia de forma libre en el puerto 8080 sin bloqueos de puerto
          sudo shellinaboxd -b -p 8080 --disable-ssl --localhost-only
          
          # 3. Lanzamos el puente invisible directo de Cloudflare apuntando al puerto correcto
          cloudflared tunnel --url http://localhost:8080
