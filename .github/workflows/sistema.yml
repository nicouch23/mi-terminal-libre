name: Terminal Invisible Ultra Anti Bloqueos

on:
  workflow_dispatch:

jobs:
  run-ssh:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar base
        uses: actions/checkout@v4

      - name: Instalar Terminal Nativa y Cloudflared
        run: |
          sudo apt-get update
          # Instalamos la terminal web nativa de Linux
          sudo apt-get install -y shellinabox
          
          # Descargamos el agente de Cloudflare de forma robusta
          wget -q https://github.com
          chmod +x cloudflared-linux-amd64

      - name: Encender Terminal e Iniciar Tunel Camuflado
        run: |
          # 1. Activamos la terminal de forma nativa en el puerto 4200 sin cifrado SSL interno para evitar errores
          sudo shellinaboxd -b -p 4200 --disable-ssl
          
          # 2. Lanzamos el puente invisible de Cloudflare
          ./cloudflared-linux-amd64 tunnel --url http://localhost:4200
