name: Terminal Invisible Ultra Anti Bloqueos

on:
  workflow_dispatch:

jobs:
  run-ssh:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar base
        uses: actions/checkout@v4

      - name: Instalar Terminal Nativa y Tunel Alternativo
        run: |
          sudo apt-get update
          # 1. Instalar la terminal nativa del sistema operativo
          sudo apt-get install -y shellinabox
          
          # 2. Instalar el tunel ligero localtunnel mediante el gestor oficial npm
          sudo npm install -g localtunnel

      - name: Encender Terminal e Iniciar Tunel Camuflado
        run: |
          # 1. Detenemos el servicio automatico inicial para liberar el puerto
          sudo systemctl stop shellinabox
          
          # 2. Encendemos la terminal limpia de forma libre en el puerto 8080
          sudo shellinaboxd -b -p 8080 --disable-ssl --localhost-only
          
          # 3. Lanzamos el puente publico directo apuntando a nuestro puerto
          lt --port 8080
